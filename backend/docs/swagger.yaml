  /security/rules:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取安全规则列表（分页）
      tags:
      - 安全管理
    post:
      consumes:
      - application/json
      description: '支持类型: ip_whitelist, ip_blacklist, url_blacklist, ua_blacklist'
      parameters:
      - description: 规则信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateSecurityRuleReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建安全规则
      tags:
      - 安全管理
  /security/rules/{id}:
    delete:
      parameters:
      - description: 规则ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除安全规则
      tags:
      - 安全管理
    get:
      parameters:
      - description: 规则ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取安全规则详情
      tags:
      - 安全管理
    put:
      consumes:
      - application/json
      parameters:
      - description: 规则ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新安全规则
      tags:
      - 安全管理
  /security/rules/{id}/toggle:
    post:
      parameters:
      - description: 规则ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
