      - 日志管理
  /logs/system:
    get:
      description: 支持 syslog, auth, nginx, nginx_error
      parameters:
      - default: syslog
        description: 日志类型
        enum:
        - syslog
        - auth
        - nginx
        - nginx_error
        in: query
        name: type
        type: string
      - default: 200
        description: 行数
        in: query
        name: lines
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取系统日志文件内容
      tags:
      - 日志管理
  /password:
    put:
      consumes:
      - application/json
      parameters:
      - description: 密码信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.ChangePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
